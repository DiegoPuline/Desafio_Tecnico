<div class="card justify-content-center">

    <p-toast />
    <h2>Lista de Cidades</h2>

    <!-- Tabela que mostra as cidades cadastradas -->
    <p-table
        [value]="listaCidades"
        [loading]="carregando"
        [paginator]="true"
        [rows]="5"
        [rowsPerPageOptions]="[5, 10, 20]"
        styleClass="p-datatable-gridlines"
        [tableStyle]="{ 'min-width': '50rem' }">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width: 5rem">ID</th>
                    <th>Nome</th>
                    <th style="width: 5rem">UF</th>
                    <th style="width: 8rem">Capital</th>
                    <th style="width: 250px">Ação</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-cidade>
                <tr>
                    <td>{{ cidade.id }}</td>
                    <td>{{ cidade.nome }}</td>
                    <td>{{ cidade.uf }}</td>
                    <td>{{ formatarCapital(cidade.capital) }}</td>
                    <td>
                        <p-button (click)="abreJanelaParaAlterarCidade(cidade)" label="Alterar"></p-button>
                        &nbsp;
                        <p-button (click)="excluir(cidade)" label="Excluir" severity="danger"></p-button>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="5" class="text-center">Nenhuma cidade encontrada.</td>
                </tr>
            </ng-template>
    </p-table>

    <p-button (click)="abreJanelaParaCadastrarNovaCidade()" label="Nova Cidade" />

    <!-- Janela para cadastro de cidade -->
    <cadastrar-cidade *ngIf="mostraJanelaCadastro" [cidade]="cidadeSelecionada" (onClose)="fechaJanelaCadastro($event)"></cadastrar-cidade>

</div>
